server:
  port: ${PORT:8080}

spring:
  mvc:
    async:
      request-timeout: 10m
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/self_management}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: ${APP_TIMEZONE:Asia/Shanghai}
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

app:
  timezone: ${APP_TIMEZONE:Asia/Shanghai}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  security:
    jwt-secret: ${JWT_SECRET:REPLACE_WITH_A_STRONG_JWT_SECRET_BEFORE_DEPLOYMENT}
    cookie-secure: ${AUTH_COOKIE_SECURE:true}
  connector:
    secret-key: ${CONNECTOR_SECRET_KEY:UkVQTEFDRV9XSVRIXzMyX0JZVEVfQUVTX0tFWV9OT1c=}
    internal-base-url: ${SYNC_WORKER_INTERNAL_BASE_URL:http://sync-worker:8081}
    internal-token: ${INTERNAL_API_TOKEN:REPLACE_WITH_A_RANDOM_INTERNAL_API_TOKEN_NOW}
  dbt:
    runner-base-url: ${DBT_RUNNER_URL:http://dbt-runner:8090}
