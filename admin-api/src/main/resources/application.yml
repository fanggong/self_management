server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/self_management}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

app:
  timezone: ${APP_TIMEZONE:Asia/Shanghai}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  security:
    jwt-secret: ${JWT_SECRET:otw-dev-jwt-secret-change-me-please-1234567890}
  connector:
    secret-key: ${CONNECTOR_SECRET_KEY:0jLUxjwhATZYPdYIgyqCzherzo2VFFa6qOdO1vMpZPI=}
    internal-base-url: ${SYNC_WORKER_INTERNAL_BASE_URL:http://sync-worker:8081}
