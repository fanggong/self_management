services:
  postgres:
    image: postgres:17
    command: ["postgres", "-c", "timezone=Asia/Shanghai"]
    environment:
      POSTGRES_DB: ${DB_NAME:-self_management}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      PGTZ: ${APP_TIMEZONE:-Asia/Shanghai}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-self_management}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  admin-api:
    build:
      context: ./admin-api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-self_management}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-otw-dev-jwt-secret-change-me-please-1234567890}
      CONNECTOR_SECRET_KEY: ${CONNECTOR_SECRET_KEY:-0jLUxjwhATZYPdYIgyqCzherzo2VFFa6qOdO1vMpZPI=}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      SYNC_WORKER_INTERNAL_BASE_URL: ${SYNC_WORKER_INTERNAL_BASE_URL:-http://sync-worker:8081}
      DBT_RUNNER_INTERNAL_BASE_URL: ${DBT_RUNNER_INTERNAL_BASE_URL:-http://dbt-runner:8090}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${APP_TIMEZONE:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  dbt-runner:
    build:
      context: ./dbt
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-self_management}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      PGTZ: ${APP_TIMEZONE:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8090:8090"
    volumes:
      - dbt-target-data:/app/target
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  sync-worker:
    build:
      context: ./sync-worker
    command: ["sh", "-lc", "python -m sync_worker.internal_api & exec celery -A sync_worker.celery_app:app worker -l info"]
    environment:
      DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-self_management}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      DBT_RUNNER_URL: ${DBT_RUNNER_URL:-http://dbt-runner:8090}
      CONNECTOR_SECRET_KEY: ${CONNECTOR_SECRET_KEY:-0jLUxjwhATZYPdYIgyqCzherzo2VFFa6qOdO1vMpZPI=}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      GARMIN_MOCK_MODE: ${GARMIN_MOCK_MODE:-false}
      SCHEDULER_POLL_SECONDS: ${SCHEDULER_POLL_SECONDS:-15}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      PGTZ: ${APP_TIMEZONE:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dbt-runner:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "sync_worker.healthcheck"]
      interval: 20s
      timeout: 5s
      retries: 10

  scheduler:
    build:
      context: ./sync-worker
    command: ["celery", "-A", "sync_worker.celery_app:app", "beat", "-l", "info"]
    environment:
      DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-self_management}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      DBT_RUNNER_URL: ${DBT_RUNNER_URL:-http://dbt-runner:8090}
      CONNECTOR_SECRET_KEY: ${CONNECTOR_SECRET_KEY:-0jLUxjwhATZYPdYIgyqCzherzo2VFFa6qOdO1vMpZPI=}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      GARMIN_MOCK_MODE: ${GARMIN_MOCK_MODE:-false}
      SCHEDULER_POLL_SECONDS: ${SCHEDULER_POLL_SECONDS:-15}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      PGTZ: ${APP_TIMEZONE:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dbt-runner:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "sync_worker.healthcheck"]
      interval: 20s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    environment:
      NUXT_PUBLIC_API_MODE: ${NUXT_PUBLIC_API_MODE:-http}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080/api/v1}
      NUXT_API_BASE_INTERNAL: ${NUXT_API_BASE_INTERNAL:-http://admin-api:8080/api/v1}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    depends_on:
      admin-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  dbt-target-data:
