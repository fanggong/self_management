version: 2

models:
  - name: dim_user_health_profile
    description: Current health profile dimension per account.
    columns:
      - name: account_id
        tests:
          - not_null
          - unique
  - name: fct_activity_session
    description: Activity fact table at session grain.
    columns:
      - name: activity_external_id
        tests:
          - not_null
  - name: fct_sleep_session
    description: Sleep fact table at session grain.
    columns:
      - name: sleep_external_id
        tests:
          - not_null
  - name: fct_health_daily_metrics
    description: Daily fact table for health metrics.
    columns:
      - name: source_record_date
        tests:
          - not_null
  - name: mart_health_dashboard_daily
    description: Read-optimized daily mart for the dashboard.
    columns:
      - name: account_id
        tests:
          - not_null
